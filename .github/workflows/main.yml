name: Sync and Build

on:
  push:
  schedule:
  - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  sync-latest-from-upstream:
    runs-on: ubuntu-latest
    name: Sync latest commits from upstream repo

    steps:
    - name: Checkout target repo
      uses: actions/checkout@v3
      with:
        ref:  master
        persist-credentials: false
        fetch-depth: 0

    - name: Sync upstream changes
      id: sync
      uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
      with:
        target_sync_branch: master
        target_repo_token: ${{ secrets.GH_TOKEN }}
        upstream_sync_branch: master
        upstream_sync_repo: holy-unblocker/website2
        upstream_pull_args: '--allow-unrelated-histories'
      
  build-docker:
    runs-on: ubuntu-latest
    name: Builds Docker image
    needs: sync-latest-from-upstream
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: diffusehyperion/holy-unblocker:latest
